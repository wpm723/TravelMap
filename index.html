<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026 沖繩八天七夜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ocean: #0077b6;
    --ocean-light: #48cae4;
    --ocean-dark: #025E90;
    --coral: #e07a5f;
    --coral-light: #f4a99b;
    --white: #ffffff;
    --bg: #f5f7fa;
    --gray-100: #f0f2f5;
    --gray-200: #dde3ea;
    --gray-400: #8a9aaa;
    --gray-600: #546070;
    --gray-800: #2d3a45;
    --text: #1a2530;
    --text-secondary: #546070;
    --shadow-sm: none;
    --shadow-md: none;
    --shadow-lg: none;
    --panel-w: 420px;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: var(--ocean-dark); }

  /* ===== LAYOUT ===== */
  #app { display: flex; height: 100vh; width: 100vw; position: relative; }
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* ===== DESKTOP PANEL ===== */
  #panel {
    width: var(--panel-w);
    height: 100vh;
    background: var(--white);
    display: flex;
    flex-direction: column;
    z-index: 100;
    position: relative;
    overflow: hidden;
  }

  /* ===== PANEL HEADER ===== */
  #panel-header {
    background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--ocean) 100%);
    padding: 12px 16px 0;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  #panel-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  #panel-header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(72,202,228,0.15);
  }
  .trip-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .trip-name {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 0;
    position: relative;
    z-index: 1;
  }

  /* ===== DAY TABS ===== */
  #day-tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
    padding-bottom: 0;
  }
  #day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 8px 8px 0 0;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    white-space: nowrap;
  }
  .day-tab:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .day-tab.active { background: var(--white); color: var(--ocean-dark); font-weight: 700; }

  /* ===== PANEL BODY ===== */
  #panel-body { flex: 1; overflow: hidden; position: relative; background: #fff; }
  .panel-view { position: absolute; inset: 0; overflow-y: auto; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; background: #fff; }
  .panel-view.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  .panel-view.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }

  /* ===== DAY HEADER ===== */
  .day-info {
    padding: 1rem 1.25rem 1rem;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
  }
  .day-label { font-size: 0.8125rem; color: var(--gray-400); }
  .day-date { font-size: 1.125rem; font-weight: 700; color: var(--text); margin-top: 2px; }

  /* ===== ITINERARY LIST ===== */
  #list-view { padding: 0 0 80px; }

  .spot-item { padding: 0 1rem; margin-top: 0.75rem; }

  /* Transport badge between stops */
  .transport-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px;
    cursor: pointer;
    user-select: none;
  }
  .transport-line { flex: 0 0 2px; width: 2px; background: var(--gray-200); height: 28px; margin-left: 23px; align-self: stretch; }
  .transport-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--gray-800);
    transition: background 0.15s;
  }
  .transport-badge:hover { background: var(--gray-200); }
  .transport-icon { font-size: 14px; }
  .transport-edit { display: none; padding: 12px 16px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 12px; margin: 4px 16px 4px 50px; }
  .transport-edit.open { display: block; }
  .transport-select-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .transport-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--gray-200);
    background: #fff;
    color: var(--gray-800);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .transport-btn.selected { background: var(--ocean); color: #fff; border-color: var(--ocean); }
  .transport-time-input { flex: 1; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; }
  .transport-save-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    background: var(--ocean);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.2s;
  }
  .transport-save-btn:hover { background: var(--ocean-dark); }

  /* ===== SPOT CARD ===== */
  .spot-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    margin: 6px 0;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .spot-card:hover { border-color: var(--ocean); }
  .spot-card-inner { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.875rem 0.875rem 0.75rem; }
  .spot-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ocean);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0;
  }
  .spot-num.food { background: var(--coral); }
  .spot-num.hotel { background: #7c3aed; }
  .spot-num.transport { background: var(--gray-400); }
  .spot-content { flex: 1; min-width: 0; }
  .spot-time {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 3px;
  }
  .spot-arrive {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    color: var(--text);
    font-weight: 700;
  }
  .spot-time-sep {
    font-size: 0.875rem;
    color: var(--gray-400);
  }
  .spot-depart {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.875rem;
    color: var(--gray-400);
    font-weight: 500;
  }
  .spot-name { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
  .spot-duration {
    font-size: 0.875rem;
    color: var(--gray-400);
    margin-bottom: 5px;
  }
  .spot-note {
    font-size: 0.875rem;
    color: var(--gray-600);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .spot-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .spot-action-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--gray-200);
    background: var(--gray-100);
    font-size: 11px;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .spot-action-btn:hover { background: var(--ocean); color: #fff; border-color: var(--ocean); }

  /* Top-right corner buttons on card */
  .spot-corner-btns {
    position: absolute;
    top: 0.75rem;
    right: 0.625rem;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 2;
  }
  .spot-map-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    background: var(--ocean);
    color: #fff;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
    min-height: 34px;
  }
  .spot-map-btn:hover { background: var(--ocean-dark); }

  /* Three-dot menu */
  .spot-menu-wrap { position: relative; }
  .spot-menu-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--gray-800);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
    padding: 0;
    flex-shrink: 0;
  }
  .spot-menu-btn:hover { background: var(--gray-100); }
  .spot-menu-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
    min-width: 120px;
    z-index: 200;
    overflow: hidden;
  }
  .spot-menu-dropdown.open { display: block; }
  .spot-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
    border: none;
    background: transparent;
    width: 100%;
    font-family: inherit;
    text-align: left;
  }
  .spot-menu-item:hover { background: var(--gray-100); }
  .spot-menu-item.danger { color: var(--coral); }
  .spot-menu-item.danger:hover { background: #fff5f3; }

  /* ===== EDIT MODAL ===== */
  .edit-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .edit-modal.open { display: flex; }
  .edit-modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow-lg);
  }
  .edit-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .edit-field { margin-bottom: 14px; }
  .edit-label { font-size: 12px; color: var(--gray-400); margin-bottom: 6px; }
  .duration-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .dtoggle-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 10px;
    border: 1.5px solid var(--gray-200);
    background: var(--gray-100);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.18s;
    font-weight: 500;
  }
  .dtoggle-btn.active {
    background: var(--ocean);
    color: #fff;
    border-color: var(--ocean);
  }
  .edit-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .edit-input:focus { border-color: var(--ocean); }
  .edit-textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    transition: border 0.2s;
  }
  .edit-textarea:focus { border-color: var(--ocean); }
  .edit-modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel { padding: 9px 18px; border-radius: 10px; border: 1px solid var(--gray-200); background: var(--gray-100); font-size: 13px; cursor: pointer; }
  .btn-save { padding: 9px 18px; border-radius: 10px; border: none; background: var(--ocean); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* ===== DETAIL VIEW ===== */
  #detail-view { background: var(--white); }
  .detail-back {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.875rem 1rem;
    cursor: pointer;
    font-size: 0.9375rem;
    font-weight: 600;
    background: var(--white);
    color: var(--text);
    position: sticky;
    top: 0;
    z-index: 5;
    justify-content: space-between;
    border-bottom: 1px solid var(--gray-200);
  }
  .detail-save-btn {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: none;
    background: var(--ocean);
    color: #fff;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .detail-save-btn:hover { background: var(--ocean-dark); }
  .detail-save-btn.saved { background: #22c55e; }

  /* Hero — display name + edit input */
  .detail-hero {
    background: var(--white);
    padding: 16px 16px 12px;
    position: relative;
    border-bottom: 1px solid var(--gray-100);
  }
  .detail-name-input {
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    flex: 1;
    outline: none;
    padding: 8px 12px;
    transition: border-color 0.2s, background 0.2s;
    min-width: 0;
  }
  .detail-name-input::placeholder { color: var(--gray-400); }
  .detail-name-input:focus { border-color: var(--ocean); background: #fff; }

  .detail-name-display {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0;
    word-break: break-all;
  }
  .detail-name-input {
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    flex: 1;
    outline: none;
    padding: 0.5rem 0.75rem;
    transition: border-color 0.2s, background 0.2s;
    min-width: 0;
  }
  .detail-name-input::placeholder { color: var(--gray-400); }
  .detail-name-input:focus { border-color: var(--ocean); background: #fff; }

  /* Type buttons */
  .detail-type-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--gray-100);
  }
  .detail-type-label {
    font-size: 0.9375rem;
    font-weight: 700;
    color: var(--text);
    padding: 0.75rem 1rem 0.375rem;
  }
  .detail-type-btn {
    padding: 0.375rem 0.875rem;
    border-radius: 20px;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    font-size: 0.875rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .detail-type-btn:hover { border-color: var(--ocean); color: var(--ocean); }
  .detail-type-btn.active { background: var(--ocean); color: #fff; border-color: var(--ocean); font-weight: 600; }

  /* Body sections */
  .detail-body { padding: 0 0 100px; }
  .detail-section {
    padding: 1rem;
    border-bottom: 1px solid var(--gray-100);
  }
  .detail-section-title {
    font-size: 0.6875rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 0.625rem;
    font-weight: 600;
  }

  /* Inline field rows */
  .detail-field-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.3rem;
    width: 100%;
    box-sizing: border-box;
  }
  .detail-field-row:last-child { margin-bottom: 0; }
  .detail-field-label {
    font-size: 0.875rem;
    color: var(--gray-400);
    flex-shrink: 0;
    width: 4.5rem;
  }
  .detail-field-input {
    flex: 1;
    min-width: 0;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    background: var(--gray-100);
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
    box-sizing: border-box;
  }
  .detail-field-input:focus { border-color: var(--ocean); background: #fff; }
  .detail-field-textarea {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    background: var(--gray-100);
    color: #37474f;
    resize: vertical;
    min-height: 5rem;
    line-height: 1.6;
    transition: border-color 0.2s, background 0.2s;
  }
  .detail-field-textarea:focus { border-color: var(--ocean); background: #fff; }
  .detail-coord-row { display: flex; gap: 0.375rem; margin-bottom: 0.375rem; width: 100%; box-sizing: border-box; }
  .detail-coord-row .detail-field-input { flex: 1; min-width: 0; }
  .detail-geocode-row { display: flex; gap: 0.375rem; width: 100%; box-sizing: border-box; }
  .detail-geocode-row .detail-field-input { flex: 1; min-width: 0; }
  .detail-geocode-status { font-size: 0.875rem; margin-top: 0.25rem; color: var(--gray-400); }

  /* Nav + time display */
  .detail-nav-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    background: var(--ocean);
    color: #fff;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .detail-nav-btn:hover { background: var(--ocean-dark); }
  .detail-time-display {
    display: flex;
    gap: 8px;
  }
  .detail-time-card {
    flex: 1;
    background: var(--gray-100);
    border-radius: 8px;
    padding: 7px 8px;
    text-align: center;
  }
  .detail-time-val { font-size: 13px; font-weight: 700; color: var(--text); }
  .detail-time-lbl { font-size: 10px; color: var(--gray-400); margin-top: 1px; }

  .custom-pin {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: var(--ocean);
    border: 2px solid transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .custom-pin .pin-num {
    transform: rotate(45deg);
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }
  .custom-pin.food { background: var(--coral); }
  .custom-pin.hotel { background: #7c3aed; }
  .custom-pin.focused {
    transform: rotate(-45deg) scale(1.28);
    border: 3px solid #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 999 !important;
  }
  .pin-label {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
  }
  .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: var(--shadow-md) !important; }
  .leaflet-popup-content { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; }

  /* ===== MOBILE ===== */
  @media (max-width: 768px) {
    #app {
      flex-direction: column;
      height: 100dvh;

<script>
// ===== TRIP META =====
let TRIP_META = {
  startDate: '2026-04-01',
  endDate: '2026-04-08',
  tripName: '八天七夜 沖繩之旅',
  tripSubtitle: '2026 · OKINAWA',
  note: ''
};

const WEEKDAYS = ['週日','週一','週二','週三','週四','週五','週六'];

function computeDayDates() {
  if (!TRIP_META.startDate || !TRIP_META.endDate) return;
  const base = new Date(TRIP_META.startDate + 'T00:00:00');
  const end  = new Date(TRIP_META.endDate   + 'T00:00:00');
  const diffDays = Math.round((end - base) / 86400000) + 1;
  // Resize DAYS array if needed (add/remove days)
  while (DAYS.length < diffDays) {
    const prev = DAYS[DAYS.length - 1];
    DAYS.push({
      label: `Day ${DAYS.length + 1}`,
      date: '',
      spots: [],
      transports: [],
      center: prev ? prev.center : [26.2, 127.7],
      zoom: prev ? prev.zoom : 13
    });
  }
  while (DAYS.length > diffDays && DAYS.length > 1) DAYS.pop();

  DAYS.forEach((d, i) => {
    const dt = new Date(base);
    dt.setDate(base.getDate() + i);
    const m = dt.getMonth() + 1;
    const day = dt.getDate();
    const wd = WEEKDAYS[dt.getDay()];
    d.date = `${m}/${String(day).padStart(2,'0')} ${wd}`;
    d.label = `Day ${i + 1}`;
  });
}

function renderHeader() {
  const sub = document.getElementById('header-subtitle');
  const name = document.getElementById('header-name');
  if (sub) sub.textContent = TRIP_META.tripSubtitle;
  if (name) name.textContent = TRIP_META.tripName;
}

const DAYS = [
  {
    label: 'Day 1', date: '4/01 週三',
    spots: [
      { id:'d1s1', num:1, type:'transport', name:'朝馬站', time:'10:00', arrive:'10:00', stay:'30分鐘', note:'搭統聯客運前往桃機', mapUrl:'', lat:24.1367, lng:120.6825 },
      { id:'d1s2', num:2, type:'transport', name:'臺灣桃園國際機場', time:'12:07', arrive:'12:07', stay:'約2.5小時', note:'泰越捷 VZ564｜桃機第一航廈｜14:55起飛｜行李25kg', mapUrl:'https://maps.app.goo.gl/BGhLx28WeWJKtawQ8', lat:25.0777, lng:121.2322 },
      { id:'d1s3', num:3, type:'airport', name:'那霸機場', time:'16:25', arrive:'16:25', stay:'1小時', note:'飛行約1小時25分抵達那霸機場', mapUrl:'', lat:26.1958, lng:127.6463 },
      { id:'d1s4', num:4, type:'food', name:'蓋飯南都屋 Donburi Nantoya', time:'17:32', arrive:'17:32', stay:'1小時', note:'素食丼飯晚餐，機場附近步行可到', mapUrl:'https://maps.app.goo.gl/2eJXiq8amqbhJoHe8', lat:26.1958, lng:127.647 },
      { id:'d1s5', num:5, type:'hotel', name:'那霸飯店', time:'19:30', arrive:'19:30', stay:'過夜', note:'〒900-0013 那霸市牧志2丁目17-22｜兩間雙人房兩晚 $6672', mapUrl:'https://maps.app.goo.gl/z3dDpynRwGNvnZCj6', lat:26.2173, lng:127.7168 },
    ],
    transports: [
      { mode:'🚌 客運', time:'97分' },
      { mode:'✈️ 飛機', time:'90分' },
      { mode:'🚶 步行', time:'7分' },
      { mode:'🚇 單軌', time:'20分' },
    ],
    center: [26.196, 127.679], zoom: 13
  },
  {
    label: 'Day 2', date: '4/02 週四',

// ===== STATE =====
let currentDay = 0;
let currentView = 'list'; // 'overview' | 'list' | 'detail'
let currentSpot = null;
let editTarget = null;
let noteTarget = null;
let map;
let markers = [];
let routeLines = [];

// ===== MAP INIT =====
function initMap() {
  map = L.map('map', { zoomControl: false }).setView(DAYS[0].center, DAYS[0].zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
}

let spotMarkers = {}; // spot.id → marker DOM element

function renderMap(dayIdx) {
  markers.forEach(m => map.removeLayer(m));
  routeLines.forEach(l => map.removeLayer(l));
  markers = [];
  routeLines = [];
  spotMarkers = {};

  const day = DAYS[dayIdx];
  const coords = day.spots
    .filter(s => s.lat != null && s.lng != null)
    .map(s => [s.lat, s.lng]);

  // Route line
  if (coords.length > 1) {
    const line = L.polyline(coords, {
      color: '#0077b6',
      weight: 3,
      opacity: 0.5,
      dashArray: '6, 8'
    }).addTo(map);
    routeLines.push(line);
  }

  // Markers
  day.spots.forEach((spot, i) => {
    if (spot.lat == null || spot.lng == null) return;
    const coord = [spot.lat, spot.lng];

    const typeClass = spot.type === 'food' ? 'food' : spot.type === 'hotel' ? 'hotel' : '';
    const icon = L.divIcon({
      html: `<div class="custom-pin ${typeClass}" data-spotid="${spot.id}"><span class="pin-num">${i+1}</span></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      className: ''
    });

    const labelIcon = L.divIcon({
      html: `<div class="pin-label">${spot.name}</div>`,
      iconSize: [null, null],
      iconAnchor: [-36, 22],
      className: ''
    });

    const m = L.marker(coord, { icon }).addTo(map);
    m.on('click', () => openDetail(spot));
    markers.push(m);
    // Store reference to the pin element after it's added to DOM
    m._spotId = spot.id;
    spotMarkers[spot.id] = m;

    const lbl = L.marker(coord, { icon: labelIcon, interactive: true }).addTo(map);
    lbl.on('click', () => openDetail(spot));
    markers.push(lbl);
  });

  map.setView(day.center, day.zoom, { animate: true });
}

function focusMapMarker(spotId) {
  document.querySelectorAll('.custom-pin.focused').forEach(el => el.classList.remove('focused'));

  // Find focused index
  const day = DAYS[currentDay];
  const focusedIdx = spotId
    ? day.spots.findIndex(s => s.id === spotId)
    : -1;

  // Set z-index for all markers based on proximity to focused
  day.spots.forEach((spot, i) => {
    const m = spotMarkers[spot.id];
    if (!m || !m._icon) return;
    if (spot.id === spotId) {
      m.setZIndexOffset(10000);
    } else if (focusedIdx >= 0) {
      // Closer index to focused = higher z-index
      const dist = Math.abs(i - focusedIdx);
      m.setZIndexOffset(1000 - dist * 10);
    } else {
      // No focus: higher index = higher z-index
      m.setZIndexOffset(i * 10);
    }
  });

  if (!spotId) return;
  const pinEl = document.querySelector(`.custom-pin[data-spotid="${spotId}"]`);
  if (pinEl) pinEl.classList.add('focused');
}

// ===== TABS =====
function renderTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';

  // Overview tab
  const ovBtn = document.createElement('button');
  ovBtn.className = 'day-tab' + (currentView === 'overview' ? ' active' : '');
  ovBtn.textContent = '總覽';
  ovBtn.onclick = () => switchToOverview();
  container.appendChild(ovBtn);

  // Day tabs
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (currentView !== 'overview' && i === currentDay ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => switchDay(i);
    container.appendChild(btn);
  });
}

function switchToOverview() {
  currentView = 'overview';
  renderTabs();
  renderOverview();
  document.getElementById('list-view').classList.add('hidden-left');
  document.getElementById('detail-view').classList.add('hidden-right');
  document.getElementById('overview-view').classList.remove('hidden-right');
  document.getElementById('overview-view').classList.remove('hidden-left');
  focusMapMarker(null);
  renderOverviewMap();
}

function getMobilePanelH() {
  if (window.innerWidth > 768) return 0;
  const panel = document.getElementById('panel');
  // Use actual offsetHeight, fallback to 40dvh
  return panel ? panel.offsetHeight : window.innerHeight * 0.40;
}

function getMapPadding(extra = 20) {
  const ph = getMobilePanelH();
  return {
    paddingTopLeft: [extra, extra],
    paddingBottomRight: [extra, ph + extra]
  };
}

function renderOverviewMap() {
  // Clear existing markers and lines
  markers.forEach(m => map.removeLayer(m));
  routeLines.forEach(l => map.removeLayer(l));
  markers = [];
  routeLines = [];
  spotMarkers = {};

  const allCoords = [];

  DAYS.forEach(day => {
    const dayCoords = day.spots
      .filter(s => s.lat != null && s.lng != null)
      .map(s => [s.lat, s.lng]);

    // Route line per day
    if (dayCoords.length > 1) {
      const line = L.polyline(dayCoords, {
        color: '#0077b6', weight: 2, opacity: 0.35, dashArray: '5, 7'
      }).addTo(map);
      routeLines.push(line);
    }

    // Small dots only (no labels)
    day.spots.forEach(spot => {
      if (spot.lat == null || spot.lng == null) return;
      allCoords.push([spot.lat, spot.lng]);
      const typeClass = spot.type === 'food' ? 'food' : spot.type === 'hotel' ? 'hotel' : '';
      const icon = L.divIcon({
        html: `<div class="custom-pin ${typeClass}" data-spotid="${spot.id}" style="width:14px;height:14px;border-width:2px;"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 14],
        className: ''
      });
      const m = L.marker([spot.lat, spot.lng], { icon }).addTo(map);
      m.on('click', () => openDetail(spot));
      markers.push(m);
      spotMarkers[spot.id] = m;
    });
  });

  if (allCoords.length >= 2) {
    const bounds = L.latLngBounds(allCoords);
    map.flyToBounds(bounds, { ...getMapPadding(30), duration: 0.8, easeLinearity: 0.25 });
  } else if (allCoords.length === 1) {
    map.flyTo(allCoords[0], 12, { duration: 0.8 });
  }
}

function switchDay(idx) {
  map.stop();
  currentDay = idx;
  currentView = 'list';
  renderTabs();
  renderList();
  renderMap(idx);
  document.getElementById('overview-view').classList.add('hidden-right');
  document.getElementById('list-view').classList.remove('hidden-left');
  document.getElementById('detail-view').classList.add('hidden-right');
  focusMapMarker(null);
  document.getElementById('list-view').scrollTop = 0;

  const spotsWithCoords = DAYS[idx].spots.filter(s => s.lat != null && s.lng != null);
  if (spotsWithCoords.length >= 2) {
    const bounds = L.latLngBounds(spotsWithCoords.map(s => [s.lat, s.lng]));
    const padOptions = getMapPadding(20);
    const ph = getMobilePanelH();
    const targetZoom = map.getBoundsZoom(bounds, false, L.point(40, 40 + ph));
    const currentZoom = map.getZoom();

    if (targetZoom > currentZoom) {
      const center = bounds.getCenter();
      map.flyTo(center, currentZoom, { duration: 0.5, easeLinearity: 0.3 });
      setTimeout(() => {
        map.flyToBounds(bounds, { ...padOptions, duration: 0.6, easeLinearity: 0.25 });
      }, 550);
    } else {
      map.flyToBounds(bounds, { ...padOptions, duration: 0.7, easeLinearity: 0.25 });
    }
  } else if (spotsWithCoords.length === 1) {
    const s = spotsWithCoords[0];
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
      const ph = getMobilePanelH();
      const targetZoom = 14;
      const spotPx = map.project([s.lat, s.lng], targetZoom);
      const offsetPx = L.point(spotPx.x, spotPx.y + ph / 2);
      map.flyTo(map.unproject(offsetPx, targetZoom), targetZoom, { duration: 0.7, easeLinearity: 0.25 });
    } else {
      map.flyTo([s.lat, s.lng], 14, { duration: 0.7 });
    }
  }
}

// ===== TIMEZONE =====
// Taiwan CST = UTC+8, Japan JST = UTC+9
// Simple rule: lng >= 123 → Japan, else → Taiwan
function getTzOffset(spot) {
  if (spot.lng == null) return 9; // default to JST for Okinawa spots without coords
  return spot.lng >= 123 ? 9 : 8;
}
function getTzLabel(spot) {
  return getTzOffset(spot) === 9
    ? '<span class="tz-badge tz-jp">JST</span>'
    : '<span class="tz-badge tz-tw">CST</span>';
}


// Parse "HH:MM" → minutes, return null if invalid
function timeToMin(t) {
  if (!t) return null;
  const m = t.match(/^(\d{1,2}):(\d{2})$/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}
// Minutes → "HH:MM"
function minToTime(m) {
  const h = Math.floor(m / 60) % 24;
  const min = m % 60;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}
// Parse transport time string like "30分", "1小時", "1.5小時", "97分" → minutes, null if unparseable
function transportToMin(t) {
  if (!t) return null;
  let min = 0;
  const hrM = t.match(/([\d.]+)\s*(?:小時|hr)/);
  const minM = t.match(/([\d.]+)\s*(?:分鐘?|min|m)(?!時)/);
  // bare number → treat as minutes
  const bareM = t.match(/^(\d+)$/);
  if (hrM) min += parseFloat(hrM[1]) * 60;
  if (minM) min += parseFloat(minM[1]);
  if (!hrM && !minM && bareM) min = parseInt(bareM[1]);
  return min > 0 ? Math.round(min) : null;
}

// Cascade-recalculate arrive times for spots from fromIdx+1 onward
// Uses: spot[fromIdx].arrive + spot[fromIdx].stay + transport[fromIdx].time → spot[fromIdx+1].arrive
// Also adds timezone offset difference when crossing between TW and JP
function recalcFromSpot(dayIdx, fromIdx) {
  const day = DAYS[dayIdx];
  for (let i = fromIdx; i < day.spots.length - 1; i++) {
    const spot = day.spots[i];
    const nextSpot = day.spots[i + 1];
    const transport = day.transports[i];
    const departTime = calcDepartTime(spot.arrive, spot.stay);
    if (!departTime) break;
    const departMin = timeToMin(departTime);
    if (departMin === null) break;
    const travelMin = transportToMin(transport ? transport.time : null);
    if (travelMin === null) break;
    // Timezone offset: e.g. TW(+8) → JP(+9) adds 60 min, JP → TW subtracts 60 min
    const tzShift = (getTzOffset(nextSpot) - getTzOffset(spot)) * 60;
    const nextArriveMin = departMin + travelMin + tzShift;
    const nextArrive = minToTime(nextArriveMin);
    nextSpot.arrive = nextArrive;
    nextSpot.time = nextArrive;
  }
}


function calcDepartTime(arrive, stay) {
  if (!arrive || !stay) return null;
  // parse HH:MM
  const m = arrive.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  let totalMin = parseInt(m[1]) * 60 + parseInt(m[2]);

  // parse stay string: support 分鐘/小時/hr/min and combos like "1.5小時", "2小時30分"
  let addMin = 0;
  const hrMatch = stay.match(/([\d.]+)\s*(?:小時|hr|h)/);
  const minMatch = stay.match(/([\d.]+)\s*(?:分鐘?|min|m)(?!時)/);
  if (hrMatch) addMin += parseFloat(hrMatch[1]) * 60;
  if (minMatch) addMin += parseFloat(minMatch[1]);
  if (addMin === 0) return null;

  totalMin += Math.round(addMin);
  const hh = String(Math.floor(totalMin / 60) % 24).padStart(2, '0');
  const mm = String(totalMin % 60).padStart(2, '0');
  return `${hh}:${mm}`;
}

function getDaySpot(d, i) { return DAYS[d].spots[i]; }

function toggleTransport(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function setTransport(day, idx, mode) {
  DAYS[day].transports[idx].mode = mode;
  // Update button states without full re-render
  const editEl = document.getElementById(`t${day}-${idx}`);
  if (editEl) {
    editEl.querySelectorAll('.transport-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.textContent.includes(mode.split(' ')[0]));
    });
  }
  // Update the badge display
  const badge = document.getElementById(`tb-${day}-${idx}`);
  if (badge) {
    badge.innerHTML = `<span class="transport-icon">${mode.split(' ')[0]}</span>
      <span>${mode.replace(/^[^ ]+ ?/,'')}</span>
      <span style="font-weight:600">${DAYS[day].transports[idx].time}</span>
      <span style="color:#aaa">▾</span>`;
  }
}

function saveTransportTime(day, idx) {
  const input = document.getElementById(`tt-${day}-${idx}`);
  if (!input) return;
  const val = input.value.trim();
  DAYS[day].transports[idx].time = val;

  // Recalculate downstream arrival times
  recalcFromSpot(day, idx);

  // Update badge
  const badge = document.getElementById(`tb-${day}-${idx}`);
  const mode = DAYS[day].transports[idx].mode;
  if (badge) {
    badge.innerHTML = `<span class="transport-icon">${mode.split(' ')[0]}</span>
      <span>${mode.replace(/^[^ ]+ ?/,'')}</span>
      <span style="font-weight:600">${val}</span>
      <span style="color:#aaa">▾</span>`;
  }
  // Brief visual feedback on button
  const btn = input.nextElementSibling;
  if (btn) {
    btn.textContent = '✓';
    btn.style.background = '#22c55e';
    setTimeout(() => { btn.textContent = '儲存'; btn.style.background = ''; }, 1200);
  }
  // Re-render list to reflect updated arrive times
  saveToStorage();
  renderList();
}

function openDetailAndEdit(dayIdx, idx) {
  detailTarget = { day: dayIdx, idx };
  currentDay = dayIdx;
  openDetailEdit();
  const listView = document.getElementById('list-view');
  listView.classList.add('hidden-left');
  document.getElementById('detail-view').classList.remove('hidden-right');
}


function duplicateFromDetail() {
  if (!detailTarget) return;
  duplicateSpot(detailTarget.day, detailTarget.idx);
}

let detailDurMode = 'stay';

function switchDetailMode(mode) {
  detailDurMode = mode;
  const stayField = document.getElementById('d-field-stay');
  const depField = document.getElementById('d-field-depart');
  if (!stayField || !depField) return;
  if (mode === 'stay') {
    stayField.style.display = '';
    depField.style.display = 'none';
    updateDetailDepart();
  } else {
    stayField.style.display = 'none';
    depField.style.display = '';
    updateDetailFromDepart();
  }
}

function updateDetailFromDepart() {
  const arrive = document.getElementById('d-arrive')?.value.trim();
  const depart = document.getElementById('d-depart-time')?.value.trim();
  const hint = document.getElementById('d-depart-hint');
  if (!hint) return;
  if (!arrive || !depart) { hint.textContent = ''; return; }
  const [ah, am] = arrive.split(':').map(Number);
  const [dh, dm] = depart.split(':').map(Number);
  const diff = (dh * 60 + dm) - (ah * 60 + am);
  if (diff <= 0) { hint.textContent = '⚠️ 離開時間需晚於抵達時間'; hint.style.color = 'var(--coral)'; return; }
  const h = Math.floor(diff / 60), m = diff % 60;
  const label = h > 0 && m > 0 ? `${h}小時${m}分鐘` : h > 0 ? `${h}小時` : `${m}分鐘`;
  hint.textContent = `→ 停留時長：${label}`;
  hint.style.color = 'var(--gray-400)';
}


function moveSpotToDay(newDayIdx) {
  if (!detailTarget) return;
  newDayIdx = parseInt(newDayIdx);
  const { day, idx } = detailTarget;
  if (newDayIdx === day) return;

  const spot = DAYS[day].spots.splice(idx, 1)[0];
  // Remove associated transport
  if (idx > 0 && DAYS[day].transports.length >= idx) DAYS[day].transports.splice(idx - 1, 1);
  else if (idx === 0 && DAYS[day].transports.length > 0) DAYS[day].transports.splice(0, 1);

  DAYS[newDayIdx].spots.push(spot);
  DAYS[newDayIdx].transports.push({ mode: '🚶 步行', time: '10分' });

  detailTarget = { day: newDayIdx, idx: DAYS[newDayIdx].spots.length - 1 };
  recalcFromSpot(day, 0);
  recalcFromSpot(newDayIdx, 0);
  saveToStorage();
  currentDay = newDayIdx;
  renderTabs();
  renderList();
  renderMap(newDayIdx);
}


function navigateDetail(dir) {
  if (!detailTarget) return;
  const { day, idx } = detailTarget;
  const total = DAYS[day].spots.length;
  if (total === 0) return;
  const newIdx = (idx + dir + total) % total;
  const fromSpot = DAYS[day].spots[idx];
  const toSpot = DAYS[day].spots[newIdx];

  if (fromSpot.lat != null && toSpot.lat != null) {
    const isMobile = window.innerWidth <= 768;
    const padPx = isMobile ? 60 : 80;
    const currentBounds = map.getBounds();
    const bothVisible = currentBounds.contains([fromSpot.lat, fromSpot.lng]) &&
                        currentBounds.contains([toSpot.lat, toSpot.lng]);

    if (bothVisible) {
      openDetail(toSpot);
    } else {
      const bounds = L.latLngBounds(
        [fromSpot.lat, fromSpot.lng],
        [toSpot.lat, toSpot.lng]
      );
      const ph = getMobilePanelH();
      map.flyToBounds(bounds, {
        paddingTopLeft: [padPx, padPx],
        paddingBottomRight: [padPx, ph + padPx],
        duration: 0.9,
        easeLinearity: 0.25
      });
      setTimeout(() => { openDetail(toSpot); }, 1050);
    }
  } else {
    openDetail(toSpot);
  }
}


function detailSetType(type) {
  document.querySelectorAll('.detail-type-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function updateDetailDepart() {
  const arrive = document.getElementById('d-arrive')?.value.trim();
  const stay = document.getElementById('d-stay')?.value.trim();
  const hint = document.getElementById('d-depart-hint');
  if (!hint) return;
  const dep = calcDepartTime(arrive, stay);
  hint.textContent = dep ? `→ 預計 ${dep} 離開` : '';
}

function updateDetailCoordBtn() {
  const lat = parseFloat(document.getElementById('d-lat')?.value);
  const lng = parseFloat(document.getElementById('d-lng')?.value);
  const btn = document.getElementById('d-coord-preview-btn');
  if (!btn) return;
  btn.style.background = (!isNaN(lat) && !isNaN(lng)) ? 'var(--ocean)' : 'var(--gray-400)';
}

function detailPreviewCoord() {
  const lat = parseFloat(document.getElementById('d-lat').value);
  const lng = parseFloat(document.getElementById('d-lng').value);
  if (!isNaN(lat) && !isNaN(lng)) {
    map.setView([lat, lng], 16, { animate: true });
    if (window._previewMarker) map.removeLayer(window._previewMarker);
    window._previewMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        html: `<div style="background:#e07a5f;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>`,
        iconSize:[18,18], iconAnchor:[9,9], className:''
      })
    }).addTo(map).bindPopup('📍 新座標預覽').openPopup();
    setTimeout(() => { if (window._previewMarker) { map.removeLayer(window._previewMarker); window._previewMarker = null; } }, 4000);
  }
}

async function detailGeocodeParking() {
  const query = document.getElementById('d-park-q')?.value.trim();
  if (!query) return;
  const status = document.getElementById('d-park-status');
  if (status) status.textContent = '查詢中…';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
    const data = await res.json();
    if (data.length > 0) {
      document.getElementById('d-park-lat').value = parseFloat(data[0].lat).toFixed(6);
      document.getElementById('d-park-lng').value = parseFloat(data[0].lon).toFixed(6);
      if (status) status.textContent = `✓ ${data[0].display_name.split(',').slice(0,3).join(', ')}`;
      saveDetailData();
    } else {
      if (status) status.textContent = '找不到結果，請換個關鍵字';
    }
  } catch { if (status) status.textContent = '查詢失敗，請稍後再試'; }
}

function detailPreviewParking() {
  const lat = parseFloat(document.getElementById('d-park-lat')?.value);
  const lng = parseFloat(document.getElementById('d-park-lng')?.value);
  if (isNaN(lat) || isNaN(lng)) return;
  L.marker([lat, lng], { icon: L.divIcon({
    html: '<div style="background:#e07a5f;width:14px;height:14px;border-radius:50%;border:2px solid #fff;"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7], className: ''
  }) }).addTo(map).bindPopup('停車場預覽').openPopup();

}


async function detailGeocode() {
  const query = document.getElementById('d-geocode-q').value.trim();
  if (!query) return;
  const status = document.getElementById('d-geocode-status');
  status.textContent = '查詢中…'; status.style.color = 'var(--gray-400)';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=3`, { headers: { 'Accept-Language': 'zh,en' } });
    const data = await res.json();
    if (!data.length) { status.textContent = '⚠️ 找不到結果'; status.style.color = 'var(--coral)'; return; }
    document.getElementById('d-lat').value = parseFloat(data[0].lat).toFixed(6);
    document.getElementById('d-lng').value = parseFloat(data[0].lon).toFixed(6);
    status.textContent = `✓ ${data[0].display_name.split(',').slice(0,3).join(', ')}`;
    status.style.color = '#22c55e';
    updateDetailCoordBtn();
  } catch { status.textContent = '⚠️ 查詢失敗'; status.style.color = 'var(--coral)'; }
}

function duplicateSpot() {
  if (!detailTarget) return;
  const { day, idx } = detailTarget;
  const src = DAYS[day].spots[idx];
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = `d${day+1}s${Date.now()}`;
  copy.num = DAYS[day].spots.length + 1;
  DAYS[day].spots.push(copy);
  DAYS[day].transports.push({ mode: '🚶 步行', time: '10分' });
  saveToStorage();
  renderList();
  renderMap(day);
  // Show feedback on save btn
  const btn = document.getElementById('detail-save-btn');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ 已建立副本';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('saved'); }, 1800);
  }
}


function deleteFromDetail() {
  if (!detailTarget) return;
  DAYS[day].spots.splice(idx, 1);
  if (idx > 0 && DAYS[day].transports.length >= idx) {
    DAYS[day].transports.splice(idx - 1, 1);
  } else if (idx === 0 && DAYS[day].transports.length > 0) {
    DAYS[day].transports.splice(0, 1);
  }
  recalcFromSpot(day, 0);
  saveToStorage();
  renderList();
  renderMap(day);
  showListView();
}

function saveDetailData() {
  if (!detailTarget) return;
  const { day, idx } = detailTarget;
  const spot = DAYS[day].spots[idx];

  const nameEl = document.getElementById('d-name');
  if (nameEl) spot.name = nameEl.value.trim() || spot.name;

  const arriveEl = document.getElementById('d-arrive');
  if (arriveEl) { spot.arrive = arriveEl.value.trim(); spot.time = spot.arrive; }

  if (detailDurMode === 'stay') {
    const stayEl = document.getElementById('d-stay');
    if (stayEl) spot.stay = stayEl.value.trim();
  } else {
    const depEl = document.getElementById('d-depart-time');
    if (depEl && spot.arrive) {
      const depart = depEl.value.trim();
      const [ah, am] = spot.arrive.split(':').map(Number);
      const [dh, dm] = depart.split(':').map(Number);
      const diff = (dh * 60 + dm) - (ah * 60 + am);
      if (diff > 0) {
        const h = Math.floor(diff / 60), m = diff % 60;
        spot.stay = h > 0 && m > 0 ? `${h}小時${m}分鐘` : h > 0 ? `${h}小時` : `${m}分鐘`;
      }
    }
  }

  const noteEl = document.getElementById('d-note');
  if (noteEl) spot.note = noteEl.value;

  const mapurlEl = document.getElementById('d-mapurl');
  if (mapurlEl) spot.mapUrl = mapurlEl.value.trim();

  const parkLat = parseFloat(document.getElementById('d-park-lat')?.value);
  const parkLng = parseFloat(document.getElementById('d-park-lng')?.value);
  if (!isNaN(parkLat) && !isNaN(parkLng)) {
    spot.parkingLat = parkLat;
    spot.parkingLng = parkLng;
  } else {
    spot.parkingLat = null;
    spot.parkingLng = null;
  }

  const activeTypeBtn = document.querySelector('.detail-type-btn.active');
  if (activeTypeBtn) {
    const typeMap = { '景點':'sight','餐廳':'food','住宿':'hotel','交通':'transport' };
    spot.type = typeMap[activeTypeBtn.textContent] || spot.type;
  }

  const lat = parseFloat(document.getElementById('d-lat')?.value);
  const lng = parseFloat(document.getElementById('d-lng')?.value);
  if (!isNaN(lat) && !isNaN(lng)) { spot.lat = lat; spot.lng = lng; }

  recalcFromSpot(day, idx);
  saveToStorage();
  renderList();

  // Show subtle saved indicator in back bar
  const ind = document.getElementById('detail-saved-ind');
  if (ind) {
    ind.textContent = '✓';
    ind.style.opacity = '1';
    clearTimeout(ind._t);
    ind._t = setTimeout(() => { ind.style.opacity = '0'; }, 1500);
  }
}

function saveDetail() {
  saveDetailData();
  renderMap(detailTarget?.day ?? currentDay);
  updateDetailDepart();
  const btn = document.getElementById('detail-save-btn');
  if (btn) {
    btn.textContent = '✓ 已儲存';
    btn.style.background = '#22c55e';
    setTimeout(() => {
      if (detailTarget) {
        openDetail(DAYS[detailTarget.day].spots[detailTarget.idx]);
      }
    }, 800);
  }
}

function showListView() {
  document.getElementById('list-view').classList.remove('hidden-left');
  document.getElementById('detail-view').classList.add('hidden-right');

}

// ===== MOBILE DRAG =====
(function() {
  const panel = document.getElementById('panel');
  const dragZone = document.getElementById('drag-zone');
  const handle = document.getElementById('drag-handle');
  let startY = 0, startH = 0, dragging = false;

  function isMobile() { return window.innerWidth <= 768; }

  function onTouchStart(e) {
    if (!isMobile()) return;
    if (e.target.closest('button, a, select, input')) return;
    dragging = true;
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    panel.style.transition = 'none';
  }

  dragZone.addEventListener('touchstart', onTouchStart, { passive: true });
  handle.addEventListener('touchstart', onTouchStart, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!dragging || !isMobile()) return;
    e.preventDefault();
    const dy = startY - e.touches[0].clientY;
    const newH = Math.max(100, Math.min(window.innerHeight * 0.95, startH + dy));
    panel.style.height = newH + 'px';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    const h = panel.offsetHeight;
    const vh = window.innerHeight;
    const s30 = vh * 0.42, s60 = vh * 0.65, s90 = vh * 0.95;
    let target, cls;
    if (h < (s30 + s60) / 2) { target = s30; cls = ''; }
    else if (h < (s60 + s90) / 2) { target = s60; cls = 'mid'; }
    else { target = s90; cls = 'expanded'; }
    panel.style.height = target + 'px';
    panel.className = cls;
  });

  // Swipe left/right — list view only
  const listView = document.getElementById('list-view');
  let swipeStartX = 0, swipeStartY = 0;
  listView.addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, { passive: true });
  listView.addEventListener('touchend', e => {
    if (!isMobile()) return;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
      else if (dx > 0 && currentDay > 0) switchDay(currentDay - 1);
    }
  }, { passive: true });
})();

function duplicateSpot(dayIdx, idx) {
  const day = DAYS[dayIdx];
  const copy = JSON.parse(JSON.stringify(day.spots[idx]));
  copy.id = `d${dayIdx+1}s${Date.now()}`;
  day.spots.splice(idx + 1, 0, copy);
  day.transports.splice(idx, 0, { mode: '🚶 步行', time: '10分' });
  recalcFromSpot(dayIdx, 0);
  saveToStorage();
  renderList();

}

function moveSpot(dayIdx, idx, dir) {
  const day = DAYS[dayIdx];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= day.spots.length) return;

  // Swap spots
  [day.spots[idx], day.spots[newIdx]] = [day.spots[newIdx], day.spots[idx]];

  // Also swap the transport that connects these two spots
  // Transport[i] sits between spot[i] and spot[i+1]
  const tIdx = dir === 1 ? idx : newIdx;
  // keep transport array length consistent — just swap the adjacent transport
  if (day.transports[tIdx] !== undefined && day.transports[tIdx + 1 - 1] !== undefined) {
    // transports stay in place; only spots moved
  }

  recalcFromSpot(dayIdx, 0);
  saveToStorage();
  renderList();
  renderMap(dayIdx);
}

// ===== DELETE =====
function deleteSpot(dayIdx, idx) {
  const day = DAYS[dayIdx];
  if (!confirm(`確定要刪除「${day.spots[idx].name}」？`)) return;
  day.spots.splice(idx, 1);
  // Remove the corresponding transport (the one leading INTO this spot)
  if (idx > 0 && day.transports.length >= idx) {
    day.transports.splice(idx - 1, 1);
  } else if (idx === 0 && day.transports.length > 0) {
    day.transports.splice(0, 1);
  }
  recalcFromSpot(dayIdx, 0);
  saveToStorage();
  renderList();
  renderMap(dayIdx);
}

// ===== DRAG & DROP =====
let dragSrcIdx = null;
function onDragStart(e, idx) {
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (idx !== dragSrcIdx) e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); dragSrcIdx = null; }
function onDrop(e, targetIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  moveSpotInList(dragSrcIdx, targetIdx);
}

function moveSpotInList(fromIdx, toIdx) {
  if (fromIdx === null || fromIdx === toIdx) return;
  const day = DAYS[currentDay];
  const [moved] = day.spots.splice(fromIdx, 1);
  day.spots.splice(toIdx, 0, moved);
  recalcFromSpot(currentDay, 0);
  saveToStorage();
  renderList();
  renderMap(currentDay);
}

// ===== TOUCH DRAG SORT =====
(function() {
  let touchDragIdx = null, touchClone = null, lastOverIdx = null;

  document.addEventListener('touchstart', (e) => {
    const item = e.target.closest('.spot-item');
    if (!item || e.target.closest('button, a, input, textarea, .spot-menu-wrap')) return;
    const idx = parseInt(item.dataset.idx);
    if (isNaN(idx)) return;

    // Long press to activate drag (400ms)
    item._longPressTimer = setTimeout(() => {
      touchDragIdx = idx;
      item.classList.add('dragging');

      // Create a visual clone
      const rect = item.getBoundingClientRect();
      touchClone = item.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:9999;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.2);`;
      document.body.appendChild(touchClone);

      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate(30);
    }, 400);
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    const item = e.target.closest('.spot-item');
    if (item && item._longPressTimer) {
      clearTimeout(item._longPressTimer);
      item._longPressTimer = null;
    }
    if (touchDragIdx === null || !touchClone) return;

    const touch = e.touches[0];

    // Move clone
    touchClone.style.top = (touch.clientY - touchClone.offsetHeight / 2) + 'px';

    // Find item under finger
    touchClone.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchClone.style.display = '';
    const overItem = el?.closest('.spot-item');
    if (overItem) {
      const overIdx = parseInt(overItem.dataset.idx);
      if (!isNaN(overIdx) && overIdx !== lastOverIdx) {
        document.querySelectorAll('.spot-item.drag-over').forEach(i => i.classList.remove('drag-over'));
        overItem.classList.add('drag-over');
        lastOverIdx = overIdx;
      }
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    // Cancel long press
    const item = e.target.closest('.spot-item');
    if (item?._longPressTimer) {
      clearTimeout(item._longPressTimer);
      item._longPressTimer = null;
    }

    if (touchDragIdx === null) return;

    const touch = e.changedTouches[0];
    if (touchClone) { touchClone.remove(); touchClone = null; }
    document.querySelectorAll('.spot-item.dragging, .spot-item.drag-over').forEach(i => {
      i.classList.remove('dragging', 'drag-over');
    });

    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const overItem = el?.closest('.spot-item');
    if (overItem) {
      const overIdx = parseInt(overItem.dataset.idx);
      if (!isNaN(overIdx)) moveSpotInList(touchDragIdx, overIdx);
    }

    touchDragIdx = null;
    lastOverIdx = null;
  });
})();
